  <ellipse cx="72" cy="62" rx="20" ry="28" fill="#FDFBF7" opacity="0.25" transform="rotate(-25 72 62)"/>

  <!-- Морда лисеняти -->
  <!-- Вуха -->
  <path d="M56 70 L46 30 L82 56 Z" fill="#FF6B4A"/>
  <path d="M144 70 L154 30 L118 56 Z" fill="#FF6B4A"/>
  <path d="M58 64 L52 42 L74 56 Z" fill="#2A2E45"/>
  <path d="M142 64 L148 42 L126 56 Z" fill="#2A2E45"/>

  <!-- Голова -->
  <path d="M100 55
           C132 55 150 78 150 105
           C150 135 128 158 100 158
           C72 158 50 135 50 105
           C50 78 68 55 100 55 Z" fill="#FF6B4A"/>

  <!-- Біла мордочка -->
  <path d="M100 92
           C118 92 130 108 130 126
           C130 145 116 158 100 158
           C84 158 70 145 70 126
           C70 108 82 92 100 92 Z" fill="#FDFBF7"/>

