  <!-- Усмішка -->
  <path d="M100 136 Q90 144 82 138" fill="none" stroke="#2A2E45" stroke-width="3" stroke-linecap="round"/>
  <path d="M100 136 Q110 144 118 138" fill="none" stroke="#2A2E45" stroke-width="3" stroke-linecap="round"/>

  <!-- Антена на шоломі -->
