<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дитячий калькулятор 🚀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky" id="sky"></div>

<div class="app">

  <!-- Екран профілю: створення / вибір -->
  <section id="profile-screen" class="screen active">
    <h1 class="title small">Хто грає?</h1>

    <div id="profile-list" class="profile-list"></div>

    <div id="new-profile-form" class="new-profile-form">
      <p class="subtitle">Обери свого космонавта</p>
      <div class="avatar-grid" id="avatar-grid"></div>
      <input type="text" id="name-input" class="name-input" placeholder="Твоє ім'я" maxlength="12">
      <button class="primary-btn" id="create-profile-btn">Почати гру</button>
    </div>

    <button class="secondary-btn" id="add-profile-btn">+ Новий гравець</button>
  </section>

  <!-- Екран вибору операції -->
  <section id="menu-screen" class="screen">
    <button id="switch-profile-btn" class="back-btn profile-badge" aria-label="Змінити профіль">
      <span id="profile-avatar-badge">🚀</span>
    </button>
    <div class="star-balance" id="star-balance">⭐ 0</div>
    <h1 class="title">Дитячий<br>калькулятор</h1>
    <p class="subtitle" id="greeting">Обери, що будемо вивчати</p>
    <div class="status-row">
      <p class="rank-label" id="rank-label">Новачок</p>
      <p class="streak-label" id="streak-label">🔥 0</p>
    </div>

    <div class="menu-grid">
      <button class="mode-card" data-op="add">
        <span class="mode-icon">➕</span>
        <span class="mode-label">Додавання</span>
      </button>
      <button class="mode-card" data-op="sub">
        <span class="mode-icon">➖</span>
        <span class="mode-label">Віднімання</span>
      </button>
      <button class="mode-card" data-op="mul">
        <span class="mode-icon">✖️</span>
        <span class="mode-label">Множення</span>
      </button>
      <button class="mode-card" data-op="div">
        <span class="mode-icon">➗</span>
        <span class="mode-label">Ділення</span>
      </button>
    </div>

    <div class="menu-footer-row">
      <button class="shop-btn" id="open-shop-btn">🛒 Магазин</button>
      <button class="shop-btn" id="open-leaders-btn">🏆 Лідери</button>
    </div>
  </section>

  <!-- Екран лідерів -->
  <section id="leaders-screen" class="screen">
    <button id="leaders-back-btn" class="back-btn" aria-label="Назад">←</button>
    <h1 class="title small">Лідери</h1>

    <div class="op-tabs" id="op-tabs"></div>
    <div class="level-tabs" id="level-tabs"></div>

    <div class="leaders-list" id="leaders-list"></div>
  </section>

  <!-- Екран магазину -->
  <section id="shop-screen" class="screen">
    <button id="shop-back-btn" class="back-btn" aria-label="Назад">←</button>
    <h1 class="title small">Магазин ракет</h1>
    <div class="star-balance" id="shop-star-balance">⭐ 0</div>

    <div class="shop-grid" id="shop-grid"></div>
  </section>

  <!-- Екран вибору рівня -->
  <section id="level-screen" class="screen">
    <button id="level-back-btn" class="back-btn" aria-label="Назад">←</button>
    <h1 class="title small" id="level-op-title">Додавання</h1>
    <p class="subtitle">Обери рівень</p>

    <div class="level-list" id="level-list"></div>
  </section>

  <!-- Екран гри -->
  <section id="game-screen" class="screen">
    <button id="back-btn" class="back-btn" aria-label="Назад">←</button>

    <div class="rocket-track">
      <div class="track-line"></div>
      <div class="track-fill" id="track-fill"></div>
      <div class="rocket" id="rocket">🚀</div>
    </div>

    <div class="score-row">
      <span id="score-label">0 / 10</span>
    </div>

    <div class="problem-card" id="problem-card">
      <div class="equation-view" id="equation-view">
        <span id="num-a">0</span>
        <span id="op-sign">+</span>
        <span id="num-b">0</span>
        <span class="eq">=</span>
        <span id="answer-slot">?</span>
      </div>
      <p class="word-view" id="word-view"></p>
    </div>

    <div id="feedback" class="feedback"></div>

    <div class="choices-grid" id="choices-grid"></div>
  </section>

  <!-- Екран результату -->
  <section id="result-screen" class="screen">
    <div class="result-rocket">🚀</div>
    <h2 id="result-title">Молодець!</h2>
    <p id="result-text">Ти відповів правильно 10 з 10 разів!</p>
    <p id="stars-earned" class="stars-earned"></p>
    <p id="streak-message" class="streak-message"></p>
    <p id="unlock-message" class="unlock-message"></p>
    <button class="primary-btn" id="play-again-btn">Грати ще раз</button>
    <button class="secondary-btn" id="menu-btn">До меню</button>
  </section>

</div>

<div id="toast" class="toast"></div>

<script src="game.js"></script>
</body>
</html>
